name: Codex clean remaining CMTS 41 values

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codex-clean-remaining-41.yml'

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clear remaining bare 41 values from equipment fields
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from collections import defaultdict
          from datetime import date
          import json

          repo = Path('.')
          data_dir = repo / 'data'
          workflow_path = repo / '.github' / 'workflows' / 'codex-clean-remaining-41.yml'

          # Keep numeric/technical fields such as macDomain, port, txChannel,
          # sourceRow, and lineCode. Clear bare 41 only from equipment/detail fields.
          clean_fields = [
              'returnSource', 'receiverBrand', 'receiverRack', 'sst', 'hubMax',
              'maxRack', 'demaxRack', 'demuxWavelength', 'dwdmSplitter', 'edfa',
              'wdm', 'txA', 'txARack', 'preAmp', 'fiberDownA', 'fiberUpA',
              'txB', 'txBRack'
          ]

          def is_bare_41(value):
              return str(value or '').strip() in {'41', '41.0'}

          report = {
              'date': str(date.today()),
              'reason': 'second pass: clear remaining bare 41 values from CMTS equipment/detail fields while preserving numeric technical fields',
              'filesChanged': [],
              'rowsTouched': 0,
              'fieldsCleared': 0,
              'samples': []
          }
          rows_by_file = defaultdict(int)

          def clean_rows(rows, file_name):
              changed = False
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  cleared = []
                  for field in clean_fields:
                      if is_bare_41(row.get(field)):
                          row[field] = ''
                          cleared.append(field)
                  if cleared:
                      changed = True
                      rows_by_file[file_name] += 1
                      report['rowsTouched'] += 1
                      report['fieldsCleared'] += len(cleared)
                      if len(report['samples']) < 20:
                          report['samples'].append({
                              'file': file_name,
                              'cmts': row.get('cmts', ''),
                              'node': row.get('node', ''),
                              'clearedFields': cleared
                          })
              return changed

          json_files = sorted(data_dir.glob('E6K*.json')) + [data_dir / 'cmts-all.json']
          for path in json_files:
              if not path.exists():
                  continue
              rows = json.loads(path.read_text(encoding='utf-8'))
              if not isinstance(rows, list):
                  continue
              if clean_rows(rows, path.name):
                  path.write_text(json.dumps(rows, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
                  report['filesChanged'].append({
                      'file': f'data/{path.name}',
                      'rowsTouched': rows_by_file[path.name],
                      'rows': len(rows)
                  })

          manifest_path = data_dir / 'manifest-cmts.json'
          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
              manifest['updated'] = str(date.today())
              rules = manifest.get('cleaningRules', [])
              rule = '設備/細節欄位中單獨的 41 清為空白；Mac Domain、Port、TX/CH、sourceRow、lineCode 保留'
              if rule not in rules:
                  rules.append(rule)
              manifest['cleaningRules'] = rules
              manifest['lastRemaining41Cleanup'] = {
                  'date': report['date'],
                  'rowsTouched': report['rowsTouched'],
                  'fieldsCleared': report['fieldsCleared']
              }
              manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              report['filesChanged'].append({'file': 'data/manifest-cmts.json', 'rowsTouched': 0, 'rows': manifest.get('totalRows', 0)})

          report_path = data_dir / 'corrections-report-remaining-41.json'
          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          if workflow_path.exists():
              workflow_path.unlink()

          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Commit cleaned data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data .github/workflows/codex-clean-remaining-41.yml
          if git diff --cached --quiet; then
            echo "No remaining 41 cleanup changes to commit."
          else
            git commit -m "Clean remaining CMTS 41 equipment values"
            git push
          fi
