name: Codex homepage patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-homepage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch homepage and node lookup
        run: |
          python3 - <<'PY'
          from pathlib import Path

          nav_link = '<a href="optical-balance-sop.html">光平衡 SOP</a>'
          card = '''      <div class="card half"><h2>光平衡 SOP</h2><p class="muted">GX2 光平衡與查光功率流程，已整理成去格線圖片版。</p><div class="row"><a class="quickbtn" href="optical-balance-sop.html">開啟光平衡 SOP 圖</a></div></div>\n'''

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          if nav_link not in index:
              index = index.replace('<a href="#tools">工具SOP</a>', '<a href="#tools">工具SOP</a>' + nav_link, 1)
              marker = '<section class="grid" id="tools" style="margin-top:14px">\n'
              if marker not in index:
                  raise SystemExit('找不到首頁工具區 section，停止更新 index.html')
              index = index.replace(marker, marker + card, 1)
              index_path.write_text(index, encoding='utf-8')

          node_path = Path('node-lookup.html')
          if node_path.exists():
              node = node_path.read_text(encoding='utf-8')
              node2 = node.replace('    <a href="optical-balance-sop.html">光平衡 SOP</a>\n', '')
              if node2 != node:
                  node_path.write_text(node2, encoding='utf-8')
          PY
      - name: Commit website patch and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html node-lookup.html
          git rm .github/workflows/codex-homepage-patch.yml
          if ! git diff --cached --quiet; then
            git commit -m "Place optical balance SOP on homepage"
            git push
          fi
