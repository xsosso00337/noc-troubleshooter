name: Codex fix CMTS JSON

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codex-fix-cmts-json.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Repair polluted CMTS JSON and add lineCode
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from collections import Counter, defaultdict
          from datetime import date
          import json
          import re

          repo = Path('.')
          data_dir = repo / 'data'
          workflow_path = repo / '.github' / 'workflows' / 'codex-fix-cmts-json.yml'

          polluted_fields = [
              'returnSource', 'receiverBrand', 'receiverRack', 'sst', 'maxRack',
              'demaxRack', 'demuxWavelength', 'dwdmSplitter', 'edfa', 'wdm',
              'txA', 'txARack', 'preAmp', 'fiberDownA', 'fiberUpA', 'txB', 'txBRack'
          ]

          def text(value):
              return str(value or '').replace('\n', '').strip()

          node_lookup = (repo / 'node-lookup.html').read_text(encoding='utf-8')
          match = re.search(r'const\s+LINE_CODES\s*=\s*\{(.*?)\};', node_lookup, re.S)
          line_codes = {}
          if match:
              line_codes = dict(re.findall(r'"([^"]+)"\s*:\s*"([^"]+)"', match.group(1)))

          report = {
              'date': str(date.today()),
              'reason': 'repair rows where the right-side line-code lookup table was imported into CMTS equipment fields',
              'filesChanged': [],
              'rowsFixed': 0,
              'fieldsCleared': 0,
              'lineCodesAdded': 0,
              'hubLabelsNormalized': 0,
              'samples': []
          }
          fixed_by_file = defaultdict(int)

          def dominant_pollution_value(row):
              values = [text(row.get(field)) for field in polluted_fields]
              numeric_values = [v for v in values if re.fullmatch(r'\d{1,4}', v)]
              if not numeric_values:
                  return None
              value, count = Counter(numeric_values).most_common(1)[0]
              # A real row should never have eight or more unrelated equipment fields
              # all equal to the same bare number. This catches the 41 pollution
              # while leaving normal CH, Mac Domain, port, and lineCode values alone.
              return value if count >= 8 else None

          def normalize_hub(value):
              raw = text(value)
              match = re.fullmatch(r'Hub\s*0?(\d+)', raw, re.I)
              if not match:
                  return value
              return f'Hub {int(match.group(1)):02d}'

          def repair_rows(rows, file_name):
              changed = False
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  node = text(row.get('node')).upper()

                  if node in line_codes and text(row.get('lineCode')) != line_codes[node]:
                      row['lineCode'] = line_codes[node]
                      report['lineCodesAdded'] += 1
                      changed = True

                  hub = text(row.get('hubMax'))
                  normalized_hub = normalize_hub(hub)
                  if normalized_hub != hub:
                      row['hubMax'] = normalized_hub
                      report['hubLabelsNormalized'] += 1
                      changed = True

                  bad_value = dominant_pollution_value(row)
                  if not bad_value:
                      continue

                  cleared = []
                  for field in polluted_fields:
                      if text(row.get(field)) == bad_value:
                          row[field] = ''
                          cleared.append(field)

                  if cleared:
                      report['rowsFixed'] += 1
                      report['fieldsCleared'] += len(cleared)
                      fixed_by_file[file_name] += 1
                      changed = True
                      if len(report['samples']) < 12:
                          report['samples'].append({
                              'file': file_name,
                              'node': node,
                              'cmts': row.get('cmts', ''),
                              'pollutedValue': bad_value,
                              'clearedFields': cleared[:]
                          })
              return changed

          json_files = sorted(data_dir.glob('E6K*.json')) + [data_dir / 'cmts-all.json']
          for path in json_files:
              if not path.exists():
                  continue
              rows = json.loads(path.read_text(encoding='utf-8'))
              if not isinstance(rows, list):
                  continue
              before = json.dumps(rows, ensure_ascii=False, sort_keys=True)
              changed = repair_rows(rows, path.name)
              after = json.dumps(rows, ensure_ascii=False, sort_keys=True)
              if changed and before != after:
                  path.write_text(json.dumps(rows, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
                  report['filesChanged'].append({'file': f'data/{path.name}', 'rowsFixed': fixed_by_file[path.name], 'rows': len(rows)})

          manifest_path = data_dir / 'manifest-cmts.json'
          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
              manifest['updated'] = str(date.today())
              manifest['source'] = 'CMTS整合表（原檔名：班表.xlsx）'
              all_path = data_dir / 'cmts-all.json'
              if all_path.exists():
                  manifest['totalRows'] = len(json.loads(all_path.read_text(encoding='utf-8')))
              for item in manifest.get('cmtsFiles', []):
                  item_path = repo / item.get('file', '')
                  if item_path.exists():
                      item['count'] = len(json.loads(item_path.read_text(encoding='utf-8')))
              rules = [rule for rule in manifest.get('cleaningRules', []) if '保留 41' not in str(rule)]
              new_rules = [
                  '修正跨區右側線編/對照表被誤匯入設備欄位造成的整排數字污染',
                  '線編依光點對照補入 lineCode；設備欄位不再用線編值回填'
              ]
              for rule in new_rules:
                  if rule not in rules:
                      rules.append(rule)
              manifest['cleaningRules'] = rules
              manifest['lastCorrection'] = {
                  'date': report['date'],
                  'rowsFixed': report['rowsFixed'],
                  'fieldsCleared': report['fieldsCleared'],
                  'lineCodesAdded': report['lineCodesAdded'],
                  'hubLabelsNormalized': report['hubLabelsNormalized']
              }
              manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              if 'data/manifest-cmts.json' not in [x['file'] for x in report['filesChanged']]:
                  report['filesChanged'].append({'file': 'data/manifest-cmts.json', 'rowsFixed': 0, 'rows': manifest.get('totalRows', 0)})

          report_path = data_dir / 'corrections-report.json'
          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          if workflow_path.exists():
              workflow_path.unlink()

          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Commit repaired data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data .github/workflows/codex-fix-cmts-json.yml
          if git diff --cached --quiet; then
            echo "No CMTS JSON changes to commit."
          else
            git commit -m "Fix CMTS JSON 41 pollution and line codes"
            git push
          fi
