name: Codex remove record generator

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/codex-remove-record-generator-20260508.yml'

permissions:
  contents: write

jobs:
  remove-record-generator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove record generator from homepage
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          homepage = Path('index.html')
          workflow = Path('.github/workflows/codex-remove-record-generator-20260508.yml')
          text = homepage.read_text(encoding='utf-8')
          original = text

          # Remove every visible shortcut that jumps to the record generator.
          text, removed_links = re.subn(
              r'\s*<a\b(?=[^>]*\bhref\s*=\s*(["\'])#record\1)[^>]*>.*?</a>',
              '',
              text,
              flags=re.IGNORECASE | re.DOTALL,
          )

          def remove_element_by_id(markup, target_id):
              opener = re.search(
                  r'<(?P<tag>section|div|article)\b(?=[^>]*\bid\s*=\s*(["\'])' + re.escape(target_id) + r'\2)[^>]*>',
                  markup,
                  flags=re.IGNORECASE,
              )
              if not opener:
                  return markup, False, ''

              tag = opener.group('tag').lower()
              start = opener.start()
              pos = opener.end()
              depth = 1
              tag_re = re.compile(r'</?' + re.escape(tag) + r'\b[^>]*>', re.IGNORECASE)

              while True:
                  match = tag_re.search(markup, pos)
                  if not match:
                      raise RuntimeError(f'Could not find closing </{tag}> for #{target_id}')

                  found = match.group(0)
                  if found.startswith('</'):
                      depth -= 1
                      if depth == 0:
                          end = match.end()
                          return markup[:start].rstrip() + '\n\n' + markup[end:].lstrip(), True, tag
                  else:
                      depth += 1

                  pos = match.end()

          text, removed_section, removed_tag = remove_element_by_id(text, 'record')

          # A second pass catches footer buttons or compact nav links after the section is gone.
          text, removed_late_links = re.subn(
              r'\s*<a\b(?=[^>]*\bhref\s*=\s*(["\'])#record\1)[^>]*>.*?</a>',
              '',
              text,
              flags=re.IGNORECASE | re.DOTALL,
          )

          remaining_record_links = len(re.findall(r'href\s*=\s*(["\'])#record\1', text, flags=re.IGNORECASE))
          remaining_record_blocks = len(re.findall(r'<(?:section|div|article)\b(?=[^>]*\bid\s*=\s*(["\'])record\1)', text, flags=re.IGNORECASE))

          if removed_links + removed_late_links == 0:
              raise RuntimeError('No #record links were removed')
          if not removed_section:
              raise RuntimeError('No #record section/div/article was removed')
          if remaining_record_links or remaining_record_blocks:
              raise RuntimeError(f'Remaining #record references: links={remaining_record_links}, blocks={remaining_record_blocks}')
          if text == original:
              raise RuntimeError('No homepage changes were produced')

          homepage.write_text(text, encoding='utf-8')
          if workflow.exists():
              workflow.unlink()

          print(f'removed_links={removed_links + removed_late_links}')
          print(f'removed_block_tag={removed_tag}')
          print('workflow_deleted=true')
          PY

      - name: Commit and push cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html .github/workflows/codex-remove-record-generator-20260508.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove unused record generator"
            git push origin HEAD:main
          fi
